name: Deploy to EC2 with CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1단계: 기능 테스트 (CI)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Gradle 권한 부여
        run: chmod +x ./gradlew

      - name: 테스트 실행
        run: ./gradlew test

  # 2단계: 자동 배포 (CD)
  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: EC2 원격 접속 및 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}, ${{ secrets.EC2_HOST_2 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          script: |
            cd ~/jarvis-backend
            git pull
            
            # 1. 서버 내부에 자동으로 .env 파일 생성 (JWT_SECRET 환경변수 안전 주입)
            cat << 'EOF' > .env
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=admin
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=localhost
            REDIS_PORT=6379
            INTERNAL_API_TOKEN=${{ secrets.INTERNAL_API_TOKEN }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            STREAM_TICKET_PRIVATE_KEY=${{ secrets.STREAM_TICKET_PRIVATE_KEY }}
            STREAM_TICKET_KID=${{ secrets.STREAM_TICKET_KID }}
            EOF
            
            # 2. 레디스 컨테이너 자동 다운로드 및 강제 삭제 후 실행
            docker stop jarvis-redis || true
            docker rm -f jarvis-redis || true
            docker run -d --name jarvis-redis --network host redis:7-alpine
            
            # [자동 청소 ①] 새 이미지 빌드 중 공간 부족 에러를 방지하기 위해 기존 좀비 이미지 선제 소거
            docker image prune -f
            
            # 3. [순서 최적화] 기존 컨테이너를 유지한 상태에서 새 이미지 선-빌드 (다운타임 최소화)
            docker build -t jarvis-backend .
            
            # 4. [충돌 원천 차단] 실행 직전 기존 백엔드 컨테이너 중지 및 강제 완전히 삭제
            docker stop jarvis-backend || true
            docker rm -f jarvis-backend || true
            
            # 5. 완벽하게 구워진 .env 파일 주입하여 최종 실행
            docker run -d --name jarvis-backend --network host --env-file .env jarvis-backend
            
            # [자동 청소 ②] 방금 새 컨테이너로 교체되면서 참조가 완전히 풀린 직전 구형 이미지를 즉시 영구 삭제
            docker image prune -f
