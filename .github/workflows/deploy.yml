name: Deploy to EC2 with CI/CD

on:
  push:
    branches: [ main ]

jobs:
  # 🛡️ 1단계: 진정한 자동화의 핵심, 기능 테스트 (CI)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 깃허브 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 17 설치 (프로젝트 자바 버전에 맞게 수정 가능)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: ✨ 팀원들이 짠 기능 테스트 코드를 자동으로 실행
        run: ./gradlew test

  # 🚚 2단계: 테스트가 '패스'했을 때만 실행되는 자동 배포 (CD)
  deploy:
    needs: test # 위의 test 작업이 무조건 성공해야만 이 단계가 실행됩니다!
    runs-on: ubuntu-latest
    steps:
      - name: EC2 서버 원격 접속 및 배포 시작
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/jarvis-backend
            git pull
            
            # 구버전 도커 끄고 새버전 빌드해서 켜기
            docker stop jarvis-backend || true
            docker rm jarvis-backend || true
            docker build -t jarvis-backend .
            docker run -d --name jarvis-backend --network host jarvis-backend
