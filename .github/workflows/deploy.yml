name: Deploy to EC2 with CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1단계: 기능 테스트 (CI)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Gradle 권한 부여
        run: chmod +x ./gradlew

      - name: 테스트 실행
        run: ./gradlew test

  # 2단계: 자동 배포 (CD)
  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: EC2 원격 접속 및 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}, ${{ secrets.EC2_HOST_2 }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          script: |
            cd ~/jarvis-backend
            git pull
            
            # 기존 컨테이너 중지 및 삭제
            docker stop jarvis-backend || true
            docker rm jarvis-backend || true
            
            # 새 이미지 빌드 및 .env 주입하여 실행
            docker build -t jarvis-backend .
            docker run -d --name jarvis-backend --network host jarvis-backend
