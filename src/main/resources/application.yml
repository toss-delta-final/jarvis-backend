spring:
  application:
    name: jarvis-backend
  profiles:
    default: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10    # 서버 2대 기준 총 20 — db.t3.micro 한도(약 34) 내 유지
      minimum-idle: 2          # 유휴 시 커넥션 반납해 슬롯 확보
      connection-timeout: 5000 # 기본 30s — 풀 고갈 시 30초 매달리는 대신 5초 fail-fast
      idle-timeout: 300000     # 5분 유휴 시 커넥션 정리
      max-lifetime: 900000     # 15분마다 커넥션 재생성 — 좀비 커넥션 누적 방지
      keepalive-time: 300000   # 5분마다 커넥션 생존 확인
  jpa:
    hibernate:
      ddl-auto: validate  # 스키마 원본은 docs/backend/schema.sql — JPA는 만들지도 바꾸지도 않음 (03 §3-1)
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2s  # Lettuce 커맨드 타임아웃(기본 60s) — Redis 장애 시 채팅/세션 경로 fail-fast
  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

# 인증 (03 D3 — AT 30분 / RT 14일, 시크릿은 환경변수)
jwt:
  secret: ${JWT_SECRET} # HS256 서명 키 — 256bit(32자) 이상. 값이 바뀌면 발급된 AT/RT가 전부 무효화된다
  access-token-minutes: 30
  refresh-token-days: 14

# mock 전이 간격 (01 §6 — 환경변수 아님, yml 기본값)
app:
  # 인증/게스트 쿠키 Secure 속성 (03 D3) — 운영은 HTTPS라 true. localhost는 secure context라 http에서도 전송됨.
  # 비-localhost origin으로 로컬 테스트 시에만 APP_COOKIE_SECURE=false로 내릴 수 있음.
  cookie:
    secure: ${APP_COOKIE_SECURE:true}
  mock:
    shipping-minutes: 5
    delivery-minutes: 5
    confirm-minutes: 10
    claim-approve-minutes: 5
  # 채팅 세션·스트림 티켓 (03 D5, 05 §1-0)
  chat:
    session-ttl-minutes: 10
  stream-ticket:
    private-key: ${STREAM_TICKET_PRIVATE_KEY} # RS256 private key — base64(PKCS#8 DER), Spring만 보관 (03 §5)
    kid: ${STREAM_TICKET_KID}
    ttl-seconds: 60
  # internal 서비스 토큰 (03 D4 — FastAPI와 .env로 공유)
  internal:
    token: ${INTERNAL_API_TOKEN} # 로컬=application-local.yml, 배포=환경변수 주입(커밋 금지). FastAPI와 동일 이름·값의 org 공유 시크릿, 미주입 시 기동 실패(fail-fast)
  # Spring→FastAPI 아웃바운드 (03 §5) — base-url 빈 값이면 통지 skip(FastAPI 미기동 로컬)
  llm:
    base-url: ${FASTAPI_BASE_URL:}
    sse-url: ${FASTAPI_BASE_URL:} # FastAPI 공개 base URL(base-url과 동일) — llmSseUrl은 여기에 /chat(구매자)·/seller/chat(판매자)을 붙여 내려감. 미설정 시 빈 값(채팅 degrade)
